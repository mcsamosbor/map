name: Deploy app

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'          # или 18, 22 – согласно вашему проекту
          cache: 'npm'                # кешируем зависимости для ускорения

      - name: Install dependencies
        run: npm ci                   # быстрее и строже, чем npm install

      - name: Build project
        run: npm run build            # команда сборки из package.json

      # Отправляем собранные файлы на сервер через rsync
      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr --delete    # флаги: архив, сжатие, рекурсия, удаление лишнего
          path: dist/                 # папка, которую создаёт npm run build (может быть public/build)
          remote_path: ${{ secrets.SSH_DEPLOY_REMOTE_PATH }}
          remote_host: ${{ secrets.SSH_DEPLOY_HOST }}
          remote_user: ${{ secrets.SSH_DEPLOY_USER }}
          remote_key: ${{ secrets.SSH_DEPLOY_PRIVATE_KEY }}